# CI for pushes and pull requests to main. Produces a workflow artifact for review.
# User-facing releases are published by .github/workflows/release.yml when a v* tag is pushed.
# See .github/RELEASING.md for the release checklist.

name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19 # v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run checks
        run: ./gradlew check

  build-artifact:
    runs-on: ubuntu-24.04
    needs: check
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19 # v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod artifact
        run: ./gradlew remapJar

      - name: Capture build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mod-artifacts
          path: build/libs/
