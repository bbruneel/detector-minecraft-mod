# Build the mod and publish a GitHub Release when a version tag is pushed.
#
# Maintainer flow:
#   1. Set mod_version in gradle.properties (must match the tag, without the "v" prefix).
#   2. Commit, then tag: git tag v1.0.0 && git push origin v1.0.0
#   3. This workflow uploads build/libs/detector-<version>.jar to the new release.
#
# See .github/RELEASING.md for the full checklist.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve release version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Tag must start with 'v' (for example v1.0.0). Got: $TAG"
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.+-]+)?$ ]]; then
            echo "Version must look like 1.0.0 or 1.0.0-rc1 (tag: v<version>). Got: $VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify gradle.properties matches tag
        run: |
          PROP="$(grep '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          if [ "${{ steps.version.outputs.version }}" != "$PROP" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match mod_version in gradle.properties ($PROP)."
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@6cfc8b8e8bb586cc164bef1c478c1eea3a4d6a19 # v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run checks and build release jar
        run: ./gradlew check remapJar

      - name: Collect release artifact
        id: artifact
        run: |
          JAR="build/libs/detector-${{ steps.version.outputs.version }}.jar"
          if [ ! -f "$JAR" ]; then
            echo "Expected release jar not found: $JAR"
            ls -la build/libs/ || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Detector ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
